apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

android {
    namespace "com.cryptotokensapp"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.cryptotokensapp"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

dependencies {
    implementation project(':react-native')
}
